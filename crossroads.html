<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CROSSROAD</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
  }
  #hud {
    width: 640px;
    display: flex;
    justify-content: space-between;
    color: #f0c040;
    font-size: 20px;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 6px 4px;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border-top: 3px solid #555;
    border-bottom: 3px solid #555;
  }
  #footer {
    width: 640px;
    display: flex;
    justify-content: center;
    color: #888;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 6px 4px;
  }
</style>
</head>
<body>

<div id="hud">
  <span>LAPS: <span id="lapDisplay">0</span></span>
  <span id="titleDisplay">CROSSROAD</span>
  <span>HI: <span id="hiDisplay">0</span></span>
</div>
<canvas id="c" width="640" height="480"></canvas>
<div id="footer" id="footer">PRESS SPACE TO START</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const W = 640, H = 480;

// ─── LAYOUT ───────────────────────────────────────────────
// 9 rows:
//   Row 0:   Safe zone (grass) top         — 40px
//   Row 1-4: Traffic lanes top (→ right)   — 4 × 44px = 176px
//   Row 5:   Yellow center divider         — 24px
//   Row 6-9: Traffic lanes bottom (← left) — 4 × 44px = 176px
//   Row 10:  Safe zone (grass) bottom      — 64px  (player starts here)
// Total: 40 + 176 + 24 + 176 + 64 = 480 ✓

const SAFE_TOP_H    = 40;
const LANE_H        = 44;
const DIVIDER_H     = 24;
const SAFE_BOT_H    = 64;
const NUM_LANES     = 4;

const SAFE_TOP_Y    = 0;
const LANES_TOP_Y   = SAFE_TOP_H;                          // 40
const DIVIDER_Y     = LANES_TOP_Y + NUM_LANES * LANE_H;   // 216
const LANES_BOT_Y   = DIVIDER_Y + DIVIDER_H;              // 240
const SAFE_BOT_Y    = LANES_BOT_Y + NUM_LANES * LANE_H;   // 416

// Lane center Y positions
function laneCenter(i) {
  // i: 0-3 = top lanes, 4-7 = bottom lanes
  if (i < 4) return LANES_TOP_Y + i * LANE_H + LANE_H / 2;
  return LANES_BOT_Y + (i - 4) * LANE_H + LANE_H / 2;
}

// ─── ATARI PALETTE ────────────────────────────────────────
const C = {
  grassTop:    '#3a7a20',
  grassBot:    '#2e6018',
  grassStripe: '#4a9a28',
  road:        '#383838',
  roadAlt:     '#303030',
  laneMarker:  '#cccccc',
  divider:     '#e8c000',
  dividerDark: '#b09000',
  moto:        '#10d8f8',
  motoDark:    '#0898b8',
  hiScore:     '#f0c040',
  flash:       '#ffffff',
};

const TRAFFIC_COLORS = [
  ['#e03018','#901808'],
  ['#f0a000','#a06000'],
  ['#28b840','#107820'],
  ['#e050e0','#903090'],
  ['#f0f030','#a0a010'],
  ['#e07828','#904010'],
  ['#30a8e0','#106890'],
  ['#e84868','#901828'],
];

// ─── TRAFFIC LANES ────────────────────────────────────────
// Top 4 lanes: go RIGHT (+x). Bottom 4 lanes: go LEFT (-x).
let trafficLanes = [];

function buildTraffic() {
  trafficLanes = [];
  for (let i = 0; i < 8; i++) {
    const isTop = i < 4;
    const dir = isTop ? 1 : -1; // 1=right, -1=left
    const baseSpeed = 1.2 + Math.random() * 0.8 + level * 0.25;
    const speed = Math.min(baseSpeed, 5.5) * dir;
    const cy = laneCenter(i);
    const interval = 80 + Math.floor(Math.random() * 60) - level * 5;
    trafficLanes.push({
      dir, speed, cy,
      cars: [],
      spawnTimer: Math.floor(Math.random() * 80),
      spawnInterval: Math.max(35, interval),
      colorIdx: (i * 3 + Math.floor(Math.random() * 3)) % TRAFFIC_COLORS.length,
    });
  }
}

function spawnCar(lane) {
  const cIdx = (lane.colorIdx + Math.floor(Math.random() * 2)) % TRAFFIC_COLORS.length;
  const carW = 48 + Math.floor(Math.random() * 20);
  const carH = 22;
  const x = lane.dir > 0 ? -carW - 4 : W + 4;
  lane.cars.push({
    x, y: lane.cy - carH / 2,
    w: carW, h: carH,
    colors: TRAFFIC_COLORS[cIdx],
  });
}

function updateTraffic() {
  trafficLanes.forEach(lane => {
    lane.spawnTimer++;
    if (lane.spawnTimer >= lane.spawnInterval) {
      lane.spawnTimer = 0;
      spawnCar(lane);
    }
    lane.cars.forEach(c => c.x += lane.speed);
    lane.cars = lane.cars.filter(c => c.x > -80 && c.x < W + 80);
  });
}

function drawTrafficCar(c, colors) {
  const x = snap(c.x), y = snap(c.y), w = c.w, h = c.h;
  // Body
  ctx.fillStyle = colors[0];
  ctx.fillRect(x, y, w, h);
  // Roof
  ctx.fillStyle = colors[1];
  ctx.fillRect(x + Math.floor(w*0.18), y + Math.floor(h*0.22),
               Math.floor(w*0.64), Math.floor(h*0.56));
  // Windshields (light blue tint)
  ctx.fillStyle = 'rgba(180,220,255,0.5)';
  ctx.fillRect(x + Math.floor(w*0.12), y + Math.floor(h*0.18),
               Math.floor(w*0.22), Math.floor(h*0.64));
  ctx.fillRect(x + Math.floor(w*0.66), y + Math.floor(h*0.18),
               Math.floor(w*0.22), Math.floor(h*0.64));
  // Wheels
  ctx.fillStyle = '#111';
  ctx.fillRect(x + 2,         y,         6, 4);
  ctx.fillRect(x + w - 8,     y,         6, 4);
  ctx.fillRect(x + 2,         y + h - 4, 6, 4);
  ctx.fillRect(x + w - 8,     y + h - 4, 6, 4);
}

function drawAllTraffic() {
  trafficLanes.forEach(lane => {
    lane.cars.forEach(c => drawTrafficCar(c, c.colors));
  });
}

// ─── ROAD DRAWING ─────────────────────────────────────────
function drawGrass(y, h, light, dark) {
  // Alternating stripes for Atari texture
  ctx.fillStyle = light;
  ctx.fillRect(0, y, W, h);
  ctx.fillStyle = dark;
  for (let sy = y; sy < y + h; sy += 8) {
    ctx.fillRect(0, sy, W, 4);
  }
}

function drawRoad() {
  // Safe zones (grass)
  drawGrass(SAFE_TOP_Y, SAFE_TOP_H, C.grassTop, C.grassStripe);
  drawGrass(SAFE_BOT_Y, SAFE_BOT_H, C.grassBot, '#246014');

  // Top road block
  ctx.fillStyle = C.road;
  ctx.fillRect(0, LANES_TOP_Y, W, NUM_LANES * LANE_H);

  // Bottom road block
  ctx.fillStyle = C.road;
  ctx.fillRect(0, LANES_BOT_Y, W, NUM_LANES * LANE_H);

  // Alternate lane shading
  for (let i = 0; i < 4; i++) {
    if (i % 2 === 1) {
      ctx.fillStyle = C.roadAlt;
      ctx.fillRect(0, LANES_TOP_Y + i * LANE_H, W, LANE_H);
      ctx.fillRect(0, LANES_BOT_Y + i * LANE_H, W, LANE_H);
    }
  }

  // Lane divider dashes (white dashes between lanes)
  ctx.fillStyle = C.laneMarker;
  for (let i = 1; i < 4; i++) {
    const yTop = LANES_TOP_Y + i * LANE_H;
    const yBot = LANES_BOT_Y + i * LANE_H;
    for (let x = 0; x < W; x += 28) {
      ctx.fillRect(x, yTop - 1, 18, 2);
      ctx.fillRect(x, yBot - 1, 18, 2);
    }
  }

  // Road edge lines (solid white)
  ctx.fillStyle = '#aaaaaa';
  ctx.fillRect(0, LANES_TOP_Y,                      W, 2);
  ctx.fillRect(0, LANES_TOP_Y + NUM_LANES * LANE_H - 2, W, 2);
  ctx.fillRect(0, LANES_BOT_Y,                      W, 2);
  ctx.fillRect(0, LANES_BOT_Y + NUM_LANES * LANE_H - 2, W, 2);

  // Center divider (yellow, chunky)
  ctx.fillStyle = C.divider;
  ctx.fillRect(0, DIVIDER_Y, W, DIVIDER_H);
  // Divider hash marks (darker yellow)
  ctx.fillStyle = C.dividerDark;
  for (let x = 0; x < W; x += 24) {
    ctx.fillRect(x, DIVIDER_Y, 12, DIVIDER_H);
  }
}

// ─── PLAYER (MOTORCYCLE) ──────────────────────────────────
const MOTO_W = 10;
const MOTO_H = 20;

let player = {
  x: W / 2,
  y: SAFE_BOT_Y + SAFE_BOT_H / 2,
  speed: 2.5,
};

function resetPlayer() {
  player.x = W / 2;
  player.y = SAFE_BOT_Y + SAFE_BOT_H / 2;
}

function drawMoto(x, y) {
  const px = snap(x - MOTO_W / 2);
  const py = snap(y - MOTO_H / 2);
  const w = MOTO_W, h = MOTO_H;

  // Wheels
  ctx.fillStyle = '#222';
  ctx.fillRect(px + 1, py,         w - 2, 4); // front wheel
  ctx.fillRect(px + 1, py + h - 4, w - 2, 4); // rear wheel

  // Body / frame
  ctx.fillStyle = C.moto;
  ctx.fillRect(px + 2, py + 3, w - 4, h - 6);

  // Rider
  ctx.fillStyle = C.motoDark;
  ctx.fillRect(px + 2, py + 4, w - 4, 6);

  // Headlight
  ctx.fillStyle = '#ffffaa';
  ctx.fillRect(px + 3, py + 1, w - 6, 2);
}

function updatePlayer() {
  const spd = player.speed;
  if (keys['ArrowLeft'])  player.x -= spd;
  if (keys['ArrowRight']) player.x += spd;
  if (keys['ArrowUp'])    player.y -= spd;
  if (keys['ArrowDown'])  player.y += spd;

  // Clamp to screen
  player.x = Math.max(MOTO_W/2 + 1, Math.min(W - MOTO_W/2 - 1, player.x));
  player.y = Math.max(MOTO_H/2 + 1, Math.min(H - MOTO_H/2 - 1, player.y));
}

// ─── COLLISION ────────────────────────────────────────────
function checkCollision() {
  const px = player.x - MOTO_W/2 + 2;
  const py = player.y - MOTO_H/2 + 2;
  const pw = MOTO_W - 4;
  const ph = MOTO_H - 4;
  for (let lane of trafficLanes) {
    for (let c of lane.cars) {
      if (px < c.x + c.w && px + pw > c.x &&
          py < c.y + c.h && py + ph > c.y) {
        return true;
      }
    }
  }
  return false;
}

// ─── LAP LOGIC ────────────────────────────────────────────
// Reaching the top safe zone = +1 lap, player resets to bottom
let lapCrossedTop = false;

function checkLap() {
  if (player.y - MOTO_H/2 <= SAFE_TOP_Y + SAFE_TOP_H) {
    if (!lapCrossedTop) {
      lapCrossedTop = true;
      laps++;
      if (laps > hiScore) hiScore = laps;
      document.getElementById('lapDisplay').textContent = laps;
      document.getElementById('hiDisplay').textContent = hiScore;
      beep(880, 0.08); beep(1100, 0.08); beep(1320, 0.12);
      resetPlayer();
      lapCrossedTop = false;
    }
  } else {
    lapCrossedTop = false;
  }
}

// ─── GAME STATE ───────────────────────────────────────────
let state = 'title'; // title | playing | dead
let laps = 0;
let hiScore = 0;
let level = 1;
let flashTimer = 0;

// Audio
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function beep(freq, dur, type='square', vol=0.12) {
  if (!audioCtx) return;
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}

function startGame() {
  laps = 0;
  level = 1;
  lapCrossedTop = false;
  document.getElementById('lapDisplay').textContent = '0';
  document.getElementById('hiDisplay').textContent = hiScore;
  resetPlayer();
  buildTraffic();
  state = 'playing';
  document.getElementById('footer').textContent = '';
}

function killPlayer() {
  state = 'dead';
  flashTimer = 18;
  beep(300, 0.05,'sawtooth'); beep(200, 0.05,'sawtooth'); beep(120, 0.3,'sawtooth', 0.2);
  document.getElementById('footer').textContent = 'PRESS SPACE TO PLAY AGAIN';
}

// ─── INPUT ────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') {
    initAudio();
    if (state === 'title' || state === 'dead') startGame();
    e.preventDefault();
  }
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// ─── HELPERS ──────────────────────────────────────────────
function snap(v) { return Math.round(v); }

// ─── SCREENS ──────────────────────────────────────────────
function drawTitle() {
  // Background
  drawRoad();
  // Dim overlay
  ctx.fillStyle = 'rgba(0,0,0,0.62)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  ctx.fillStyle = '#f0c040';
  ctx.font = 'bold 52px "Courier New"';
  ctx.fillText('CROSSROAD', W/2, 160);

  ctx.fillStyle = '#e04020';
  ctx.font = '18px "Courier New"';
  ctx.fillText('CROSS THE HIGHWAY — MAKE LAPS', W/2, 210);

  ctx.fillStyle = '#aaaaaa';
  ctx.font = '15px "Courier New"';
  ctx.fillText('ARROW KEYS TO MOVE', W/2, 280);
  ctx.fillText('AVOID ALL TRAFFIC', W/2, 305);
  ctx.fillText('REACH THE TOP ZONE TO SCORE A LAP', W/2, 330);

  ctx.fillStyle = '#f0c040';
  ctx.font = '17px "Courier New"';
  if (Math.floor(Date.now()/500) % 2 === 0)
    ctx.fillText('PRESS SPACE TO START', W/2, 400);
}

function drawDeadOverlay() {
  if (flashTimer > 0) {
    ctx.fillStyle = `rgba(255,255,255,${flashTimer / 18})`;
    ctx.fillRect(0, 0, W, H);
    flashTimer--;
    return;
  }
  ctx.fillStyle = 'rgba(0,0,0,0.68)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#e04020';
  ctx.font = 'bold 44px "Courier New"';
  ctx.fillText('WIPEOUT!', W/2, 190);
  ctx.fillStyle = '#f0c040';
  ctx.font = '22px "Courier New"';
  ctx.fillText('LAPS: ' + laps, W/2, 250);
  ctx.fillText('BEST: ' + hiScore, W/2, 285);
  if (Math.floor(Date.now()/500) % 2 === 0) {
    ctx.fillStyle = '#aaaaaa';
    ctx.font = '15px "Courier New"';
    ctx.fillText('PRESS SPACE TO TRY AGAIN', W/2, 350);
  }
}

// Scanlines
function drawScanlines() {
  ctx.fillStyle = 'rgba(0,0,0,0.10)';
  for (let y = 0; y < H; y += 2) {
    ctx.fillRect(0, y, W, 1);
  }
}

// ─── MAIN LOOP ────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  if (state === 'title') {
    drawTitle();
    drawScanlines();
    return;
  }

  // Draw world
  drawRoad();
  updateTraffic();
  drawAllTraffic();
  drawMoto(player.x, player.y);

  if (state === 'playing') {
    updatePlayer();
    checkLap();
    if (checkCollision()) killPlayer();
  }

  if (state === 'dead') {
    drawDeadOverlay();
  }

  drawScanlines();
}

requestAnimationFrame(loop);
</script>
</body>
</html>
