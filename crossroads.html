<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CROSSROADS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    user-select: none;
  }
  #hud {
    width: 640px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #f0c040;
    font-size: 20px;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 6px 8px;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #footer {
    width: 640px;
    text-align: center;
    color: #888;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 6px 4px;
    height: 24px;
  }
</style>
</head>
<body>

<div id="hud">
  <span>LAPS:&nbsp;<span id="lapDisplay">0</span></span>
  <span>CROSSROADS</span>
  <span>BEST:&nbsp;<span id="hiDisplay">0</span></span>
</div>
<canvas id="c" width="640" height="480"></canvas>
<div id="footer">&nbsp;</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  CROSSROADS — Atari 2600 style, 30fps, 9 levels
// ═══════════════════════════════════════════════════════════════════

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const W = 640, H = 480;
const FPS              = 30;
const FRAME_MS         = 1000 / FPS;       // ~33.33ms per frame
const LEVEL_SECS       = 20;
const MAX_LEVEL        = 9;
const FRAMES_PER_LEVEL = LEVEL_SECS * FPS; // 600 frames per level

// ── LAYOUT ──────────────────────────────────────────────────────────
//   0.. 39  safe top     40px
//  40..215  4 top lanes  4×44=176px   cars go LEFT (←)
// 216..239  divider      24px
// 240..415  4 bot lanes  4×44=176px   cars go RIGHT (→)
// 416..479  safe bottom  64px

const SAFE_TOP_H  = 40;
const LANE_H      = 44;
const DIVIDER_H   = 24;
const SAFE_BOT_H  = 64;
const NLANES      = 4;

const SAFE_TOP_Y  = 0;
const LANES_TOP_Y = SAFE_TOP_H;
const DIVIDER_Y   = LANES_TOP_Y + NLANES * LANE_H;   // 216
const LANES_BOT_Y = DIVIDER_Y   + DIVIDER_H;          // 240
const SAFE_BOT_Y  = LANES_BOT_Y + NLANES * LANE_H;   // 416

// Lane center Y
// Bottom: Lane 0 = bottommost row, Lane 3 = closest to divider
// Top:    Lane 0 = topmost row,    Lane 3 = closest to divider
function laneCY(group, lane) {
  if (group === 'bot')
    return LANES_BOT_Y + (NLANES - 1 - lane) * LANE_H + LANE_H / 2;
  return LANES_TOP_Y + lane * LANE_H + LANE_H / 2;
}

// ── CROSSROADS ──────────────────────────────────────────────────────
const CX      = W / 2;
const CROSS_W = 20;
const LEFT_CX  = CX - 32;   // 288
const RIGHT_CX = CX + 32;   // 352

// ── PER-LANE PER-LEVEL CONFIG ────────────────────────────────────────
// LANE_CONFIG[level][laneIdx]
//   speed      : pixels per frame (30fps)
//   interval   : frames between spawns
//   firstDelay : frames before first spawn when level begins
//
// Applies identically to both bottom (→) and top (←) lanes.
// ── PLACEHOLDER VALUES — tune to taste ──────────────────────────────
const LANE_CONFIG = {
  1: [
    { speed:2.0, interval:180, firstDelay:0 },
    { speed:2.0, interval:120,  firstDelay:0 },
    { speed:3.0, interval:120,  firstDelay:30 },
    { speed:4.0, interval:150,  firstDelay:0 },
  ],
  2: [
    { speed:2.0, interval:150,  firstDelay:30 },
    { speed:3.0, interval:120,  firstDelay:30 },
    { speed:3.0, interval:90,  firstDelay:60  },
    { speed:4.0, interval:150,  firstDelay:30 },
  ],
  3: [
    { speed:2.5, interval:68,  firstDelay:12 },
    { speed:2.0, interval:75,  firstDelay:30 },
    { speed:3.0, interval:82,  firstDelay:6  },
    { speed:2.3, interval:60,  firstDelay:45 },
  ],
  4: [
    { speed:2.8, interval:62,  firstDelay:10 },
    { speed:2.3, interval:68,  firstDelay:25 },
    { speed:3.3, interval:74,  firstDelay:5  },
    { speed:2.6, interval:55,  firstDelay:40 },
  ],
  5: [
    { speed:3.0, interval:56,  firstDelay:8  },
    { speed:2.5, interval:62,  firstDelay:20 },
    { speed:3.6, interval:66,  firstDelay:4  },
    { speed:2.9, interval:50,  firstDelay:35 },
  ],
  6: [
    { speed:3.3, interval:50,  firstDelay:6  },
    { speed:2.8, interval:56,  firstDelay:18 },
    { speed:3.9, interval:60,  firstDelay:3  },
    { speed:3.2, interval:45,  firstDelay:30 },
  ],
  7: [
    { speed:3.6, interval:45,  firstDelay:5  },
    { speed:3.1, interval:50,  firstDelay:15 },
    { speed:4.2, interval:54,  firstDelay:3  },
    { speed:3.5, interval:40,  firstDelay:25 },
  ],
  8: [
    { speed:3.9, interval:40,  firstDelay:4  },
    { speed:3.4, interval:44,  firstDelay:12 },
    { speed:4.5, interval:48,  firstDelay:2  },
    { speed:3.8, interval:36,  firstDelay:20 },
  ],
  9: [
    { speed:4.2, interval:36,  firstDelay:3  },
    { speed:3.7, interval:40,  firstDelay:10 },
    { speed:4.8, interval:42,  firstDelay:2  },
    { speed:4.1, interval:32,  firstDelay:15 },
  ],
};

// ── ATARI PALETTE ────────────────────────────────────────────────────
const C = {
  grassTop    : '#3a7a20',
  grassTopAlt : '#2e6418',
  grassBot    : '#2e6018',
  grassBotAlt : '#245014',
  road        : '#3a3a3a',
  roadAlt     : '#2e2e2e',
  laneMarker  : '#bbbbbb',
  divider     : '#e8c000',
  dividerDark : '#a08800',
  crossroad   : '#505828',
  crossEdge   : '#787840',
  moto        : '#10d8f8',
  motoDark    : '#0898b8',
};

const TCOLORS = [
  ['#e03018','#801008'],
  ['#f0a000','#905800'],
  ['#28b840','#107020'],
  ['#d050d0','#802880'],
  ['#e8e020','#989010'],
  ['#e07020','#904010'],
  ['#2090d8','#105888'],
  ['#e04060','#901030'],
];

// ── TRAFFIC ──────────────────────────────────────────────────────────
let laneObjs = [];

function makeLaneObjs() {
  laneObjs = [];
  for (let i = 0; i < NLANES; i++) {
    const cfg = LANE_CONFIG[gameLevel][i];
    // Bottom lane i — goes RIGHT
    laneObjs.push({
      group   : 'bot', laneIdx: i, dir: 1,
      cy      : laneCY('bot', i),
      speed   : cfg.speed,
      interval: cfg.interval,
      timer   : -cfg.firstDelay,
      cars    : [],
      colorOff: i * 2,
    });
    // Top lane i — goes LEFT (mirror)
    laneObjs.push({
      group   : 'top', laneIdx: i, dir: -1,
      cy      : laneCY('top', i),
      speed   : cfg.speed,
      interval: cfg.interval,
      timer   : -cfg.firstDelay,
      cars    : [],
      colorOff: i * 2 + 1,
    });
  }
}

function applyLevelToLanes() {
  laneObjs.forEach(lo => {
    const cfg  = LANE_CONFIG[gameLevel][lo.laneIdx];
    lo.speed   = cfg.speed;
    lo.interval = cfg.interval;
    // Cars already on screen immediately adopt new speed
    lo.cars.forEach(c => c.speed = cfg.speed * lo.dir);
  });
}

function spawnCar(lo) {
  const ci = (lo.colorOff + Math.floor(Math.random() * 2)) % TCOLORS.length;
  const cw = 44 + Math.floor(Math.random() * 20);
  const ch = 22;
  const x  = lo.dir > 0 ? -cw - 4 : W + 4;
  lo.cars.push({
    x, y: lo.cy - ch / 2,
    w: cw, h: ch,
    col  : TCOLORS[ci],
    speed: lo.speed * lo.dir,
  });
}

function updateTraffic() {
  laneObjs.forEach(lo => {
    lo.timer++;
    if (lo.timer >= lo.interval) { lo.timer = 0; spawnCar(lo); }
    lo.cars.forEach(c => c.x += c.speed);
    lo.cars = lo.cars.filter(c => c.x > -100 && c.x < W + 100);
  });
}

function drawCar(c) {
  const x = snap(c.x), y = snap(c.y), w = c.w, h = c.h;
  ctx.fillStyle = c.col[0];
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = c.col[1];
  ctx.fillRect(x+~~(w*.18), y+~~(h*.22), ~~(w*.64), ~~(h*.55));
  ctx.fillStyle = 'rgba(160,210,255,0.45)';
  ctx.fillRect(x+~~(w*.10), y+~~(h*.18), ~~(w*.20), ~~(h*.62));
  ctx.fillRect(x+~~(w*.70), y+~~(h*.18), ~~(w*.20), ~~(h*.62));
  ctx.fillStyle = '#111';
  ctx.fillRect(x+2,     y,         6, 4);
  ctx.fillRect(x+w-8,   y,         6, 4);
  ctx.fillRect(x+2,     y+h-4,     6, 4);
  ctx.fillRect(x+w-8,   y+h-4,     6, 4);
}

function drawAllTraffic() {
  laneObjs.forEach(lo => lo.cars.forEach(drawCar));
}

// ── ROAD ─────────────────────────────────────────────────────────────
function drawStripes(y, h, c1, c2, sh) {
  ctx.fillStyle = c1; ctx.fillRect(0, y, W, h);
  ctx.fillStyle = c2;
  for (let sy = y; sy < y+h; sy += sh*2) ctx.fillRect(0, sy, W, sh);
}

function drawRoad() {
  drawStripes(SAFE_TOP_Y, SAFE_TOP_H, C.grassTop, C.grassTopAlt, 4);
  drawStripes(SAFE_BOT_Y, SAFE_BOT_H, C.grassBot, C.grassBotAlt, 4);

  for (let i = 0; i < NLANES; i++) {
    ctx.fillStyle = i % 2 === 0 ? C.road : C.roadAlt;
    ctx.fillRect(0, LANES_TOP_Y + i*LANE_H, W, LANE_H);
    ctx.fillRect(0, LANES_BOT_Y + i*LANE_H, W, LANE_H);
  }

  ctx.fillStyle = C.laneMarker;
  for (let i = 1; i < NLANES; i++) {
    const yT = LANES_TOP_Y + i*LANE_H, yB = LANES_BOT_Y + i*LANE_H;
    for (let x = 0; x < W; x += 28) {
      ctx.fillRect(x, yT-1, 18, 2);
      ctx.fillRect(x, yB-1, 18, 2);
    }
  }

  ctx.fillStyle = '#999';
  ctx.fillRect(0, LANES_TOP_Y,                   W, 2);
  ctx.fillRect(0, LANES_TOP_Y+NLANES*LANE_H-2,   W, 2);
  ctx.fillRect(0, LANES_BOT_Y,                   W, 2);
  ctx.fillRect(0, LANES_BOT_Y+NLANES*LANE_H-2,   W, 2);

  ctx.fillStyle = C.divider;
  ctx.fillRect(0, DIVIDER_Y, W, DIVIDER_H);
  ctx.fillStyle = C.dividerDark;
  for (let x = 0; x < W; x += 24) ctx.fillRect(x, DIVIDER_Y, 12, DIVIDER_H);

  // Crossroad paths over road and grass
  for (const cx of [LEFT_CX, RIGHT_CX]) {
    ctx.fillStyle = C.crossroad;
    ctx.fillRect(snap(cx-CROSS_W/2), 0, CROSS_W, H);
    ctx.fillStyle = C.crossEdge;
    ctx.fillRect(snap(cx-CROSS_W/2),     0, 2, H);
    ctx.fillRect(snap(cx+CROSS_W/2-2),   0, 2, H);
  }
}

// ── LEVEL INDICATOR (upper-left of game canvas) ──────────────────────
function drawLevelIndicator() {
  ctx.fillStyle = '#f0c040';
  ctx.font = 'bold 14px "Courier New"';
  ctx.textAlign = 'left';
  ctx.fillText('L' + gameLevel, 6, 16);
}

// ── PLAYER ───────────────────────────────────────────────────────────
const MW = 10, MH = 20;
let player = {};
let lapStarted = false, crossedBotLanes = false,
    crossedDivider = false, crossedTopLanes = false;

function resetPlayer() {
  player = {
    x: LEFT_CX, y: SAFE_BOT_Y + SAFE_BOT_H * 0.55,
    speed: 4.0, crossX: LEFT_CX,
  };
  lapStarted = crossedBotLanes = crossedDivider = crossedTopLanes = false;
}

function drawMoto(x, y) {
  const px = snap(x-MW/2), py = snap(y-MH/2);
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(px+1, py+MH-5, MW-2, 5);
  ctx.fillRect(px+1, py,       MW-2, 5);
  ctx.fillStyle = C.moto;
  ctx.fillRect(px+2, py+4, MW-4, MH-8);
  ctx.fillStyle = C.motoDark;
  ctx.fillRect(px+2, py+5, MW-4, 7);
  ctx.fillStyle = '#ffff99';
  ctx.fillRect(px+3, py+1, MW-6, 3);
}

function updatePlayer() {
  if (keys['ArrowUp'])   player.y -= player.speed;
  if (keys['ArrowDown']) player.y += player.speed;
  player.x = player.crossX;
  player.y = Math.max(MH/2+1, Math.min(H-MH/2-1, player.y));
}

// ── COLLISION ────────────────────────────────────────────────────────
function checkCollision() {
  const px = player.x-MW/2+2, py = player.y-MH/2+2;
  const pw = MW-4, ph = MH-4;
  for (const lo of laneObjs)
    for (const c of lo.cars)
      if (px < c.x+c.w && px+pw > c.x && py < c.y+c.h && py+ph > c.y)
        return true;
  return false;
}

// ── LAP ──────────────────────────────────────────────────────────────
function getZone(y) {
  if (y >= SAFE_BOT_Y)                     return 'botSafe';
  if (y >= LANES_BOT_Y && y < SAFE_BOT_Y)  return 'botLanes';
  if (y >= DIVIDER_Y   && y < LANES_BOT_Y) return 'divider';
  if (y >= LANES_TOP_Y && y < DIVIDER_Y)   return 'topLanes';
  return 'topSafe';
}

function checkLap() {
  const zone = getZone(player.y);
  if (!lapStarted) { if (zone !== 'botSafe') lapStarted = true; return; }
  if (zone === 'botLanes' || zone === 'divider' || zone === 'topLanes') crossedBotLanes = true;
  if (zone === 'divider'  || zone === 'topLanes') crossedDivider = true;
  if (zone === 'topLanes') crossedTopLanes = true;
  if (zone === 'topSafe' && crossedBotLanes && crossedDivider && crossedTopLanes) {
    laps++;
    if (laps > hiScore) hiScore = laps;
    document.getElementById('lapDisplay').textContent = laps;
    document.getElementById('hiDisplay').textContent  = hiScore;
    beep(880,0.07); beep(1100,0.07); beep(1320,0.10); beep(1760,0.14);
    resetPlayer();
  }
  if (zone === 'botSafe')
    lapStarted = crossedBotLanes = crossedDivider = crossedTopLanes = false;
}

// ── LEVEL TIMER ──────────────────────────────────────────────────────
let gameLevel  = 1;
let frameCount = 0;

function updateLevel() {
  frameCount++;
  const newLevel = Math.min(MAX_LEVEL, Math.floor(frameCount / FRAMES_PER_LEVEL) + 1);
  if (newLevel !== gameLevel) {
    gameLevel = newLevel;
    applyLevelToLanes();
    beep(440,0.05); beep(550,0.08);
  }
  if (frameCount >= FRAMES_PER_LEVEL * MAX_LEVEL) endGame();
}

// ── GAME STATE ───────────────────────────────────────────────────────
let state = 'title', laps = 0, hiScore = 0, flashTimer = 0;

function startGame() {
  laps = 0; gameLevel = 1; frameCount = 0;
  document.getElementById('lapDisplay').textContent = '0';
  document.getElementById('hiDisplay').textContent  = hiScore;
  document.getElementById('footer').textContent     = '';
  resetPlayer();
  makeLaneObjs();
  state = 'playing';
}

function killPlayer() {
  state = 'dead'; flashTimer = 20;
  beep(280,0.05,'sawtooth');
  setTimeout(()=>beep(180,0.05,'sawtooth'),60);
  setTimeout(()=>beep(110,0.30,'sawtooth',0.22),120);
  document.getElementById('footer').textContent = 'PRESS SPACE TO PLAY AGAIN';
}

function endGame() {
  state = 'gameover';
  beep(440,0.1); beep(330,0.1); beep(220,0.3,'sawtooth',0.18);
  document.getElementById('footer').textContent = 'PRESS SPACE TO PLAY AGAIN';
}

// ── AUDIO ────────────────────────────────────────────────────────────
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
}
function beep(freq, dur, type='square', vol=0.12) {
  if (!audioCtx) return;
  try {
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.start(); o.stop(audioCtx.currentTime+dur);
  } catch(e){}
}

// ── INPUT ────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key===' ') {
    initAudio();
    if (state==='title'||state==='dead'||state==='gameover') startGame();
    e.preventDefault();
  }
  if (['ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key]=false; });

// ── HELPERS ──────────────────────────────────────────────────────────
function snap(v) { return Math.round(v); }

// ── SCREENS ──────────────────────────────────────────────────────────
function drawTitle() {
  drawRoad();
  drawMoto(LEFT_CX,  SAFE_BOT_Y+32);
  drawMoto(RIGHT_CX, SAFE_BOT_Y+32);
  ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#f0c040'; ctx.font='bold 54px "Courier New"';
  ctx.fillText('CROSSROADS',W/2,155);
  ctx.fillStyle='#e04020'; ctx.font='17px "Courier New"';
  ctx.fillText('CROSS ALL 8 LANES TO SCORE A LAP',W/2,205);
  ctx.fillStyle='#aaaaaa'; ctx.font='14px "Courier New"';
  ctx.fillText('UP / DOWN ARROWS TO MOVE',W/2,272);
  ctx.fillText('AVOID THE TRAFFIC',W/2,296);
  ctx.fillText('9 LEVELS  —  20 SECONDS EACH',W/2,320);
  if (Math.floor(Date.now()/500)%2===0) {
    ctx.fillStyle='#f0c040'; ctx.font='17px "Courier New"';
    ctx.fillText('PRESS SPACE TO START',W/2,400);
  }
}

function drawDeadOverlay() {
  if (flashTimer>0) {
    ctx.fillStyle=`rgba(255,255,255,${flashTimer/20})`; ctx.fillRect(0,0,W,H);
    flashTimer--; return;
  }
  ctx.fillStyle='rgba(0,0,0,0.70)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#e04020'; ctx.font='bold 46px "Courier New"';
  ctx.fillText('WIPEOUT!',W/2,185);
  ctx.fillStyle='#f0c040'; ctx.font='22px "Courier New"';
  ctx.fillText('LAPS: '+laps,W/2,248);
  ctx.fillText('BEST: '+hiScore,W/2,282);
  if (Math.floor(Date.now()/500)%2===0) {
    ctx.fillStyle='#aaaaaa'; ctx.font='14px "Courier New"';
    ctx.fillText('PRESS SPACE TO TRY AGAIN',W/2,348);
  }
}

function drawGameOverOverlay() {
  ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#f0c040'; ctx.font='bold 42px "Courier New"';
  ctx.fillText('GAME OVER',W/2,170);
  ctx.font='20px "Courier New"';
  ctx.fillText('ALL 9 LEVELS COMPLETE',W/2,220);
  ctx.font='22px "Courier New"';
  ctx.fillText('LAPS: '+laps,W/2,275);
  ctx.fillText('BEST: '+hiScore,W/2,308);
  if (Math.floor(Date.now()/500)%2===0) {
    ctx.fillStyle='#aaaaaa'; ctx.font='14px "Courier New"';
    ctx.fillText('PRESS SPACE TO PLAY AGAIN',W/2,370);
  }
}

function drawScanlines() {
  ctx.fillStyle='rgba(0,0,0,0.09)';
  for (let y=0; y<H; y+=2) ctx.fillRect(0,y,W,1);
}

// ── 30 FPS LOOP ──────────────────────────────────────────────────────
let lastTime = 0;

function loop(ts) {
  requestAnimationFrame(loop);
  if (ts - lastTime < FRAME_MS - 1) return;
  lastTime = ts;

  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

  if (state==='title') { drawTitle(); drawScanlines(); return; }

  drawRoad();

  if (state==='playing') {
    updateTraffic();
    updatePlayer();
    checkLap();
    updateLevel();
    if (checkCollision()) killPlayer();
  } else {
    updateTraffic(); // traffic keeps moving on dead/gameover
  }

  drawAllTraffic();
  drawMoto(player.x, player.y);
  drawLevelIndicator();

  if (state==='dead')     drawDeadOverlay();
  if (state==='gameover') drawGameOverOverlay();

  drawScanlines();
}

requestAnimationFrame(loop);
</script>
</body>
</html>
