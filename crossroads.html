<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CROSSROADS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#111;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;

    user-select:none;
  }
  #hud {
    width:640px;

    padding:6px 8px;
  }
  canvas {
    display:block;
    image-rendering:pixelated;
    image-rendering:crisp-edges;
  }
  #footer {
    width:640px;
    text-align:center;
    color:#888;
    font-size:16px;
    letter-spacing:3px;

    height:24px;
  }
  /* License MIT used in this file */

      position: fixed;

  /* License */
</style>
</head>
<body>
<div id="hud">
  <span>CROSSROADS</span>
</div>
<canvas id="c" width="640" height="480"></canvas>
<div id="footer">&nbsp;</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  CROSSROADS — Atari 2600 style, 30fps, 9 levels, figure-8 laps
// ═══════════════════════════════════════════════════════════════════

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const W = 640, H = 480;
const FPS              = 30;
const FRAME_MS         = 1000 / FPS;
const LEVEL_SECS       = 20;
const MAX_LEVEL        = 9;
const FRAMES_PER_LEVEL = LEVEL_SECS * FPS;  // 600
const HIT_FREEZE_MS    = 500;
const WARN_FRAMES      = 5 * FPS;           // 150 — last 5 seconds of level
const WARN_CYCLE       = 30;                // 30 frames = 1 second per blink cycle
const WARN_DARK        = 9;                 // frames dark (≈300ms)
const CAR_SOUND_DIST   = 200;               // px — max Y-distance for car sound

// ── LAYOUT ──────────────────────────────────────────────────────────
//   0.. 39  safe top     40px
//  40..215  4 top lanes  4×44=176px   cars go LEFT (←)
// 216..239  divider      24px
// 240..415  4 bot lanes  4×44=176px   cars go RIGHT (→)
// 416..479  safe bottom  64px

const SAFE_TOP_H  = 40;
const LANE_H      = 44;
const DIVIDER_H   = 24;
const SAFE_BOT_H  = 64;
const NLANES      = 4;

const SAFE_TOP_Y  = 0;
const LANES_TOP_Y = SAFE_TOP_H;                        // 40
const DIVIDER_Y   = LANES_TOP_Y + NLANES * LANE_H;    // 216
const LANES_BOT_Y = DIVIDER_Y   + DIVIDER_H;           // 240
const SAFE_BOT_Y  = LANES_BOT_Y + NLANES * LANE_H;    // 416

// Lane center Y
// Bottom: Lane 0 = bottommost (near safe zone), Lane 3 = nearest divider
// Top:    Lane 0 = topmost (near safe zone),    Lane 3 = nearest divider
function laneCY(group, lane) {
  if (group === 'bot')
    return LANES_BOT_Y + (NLANES - 1 - lane) * LANE_H + LANE_H / 2;
  return LANES_TOP_Y + lane * LANE_H + LANE_H / 2;
}

// ── CROSSROADS ──────────────────────────────────────────────────────
const CX       = W / 2;
const CROSS_W  = 20;
const LEFT_CX  = CX - 32;   // 288
const RIGHT_CX = CX + 32;   // 352

// Y threshold: "clear of traffic" — just outside the road blocks
const CLEAR_TOP_Y = SAFE_TOP_Y + SAFE_TOP_H / 2;        // 20 — well inside top safe zone
const CLEAR_BOT_Y = SAFE_BOT_Y + SAFE_BOT_H / 2;        // 448 — well inside bottom safe zone

// ── PER-LANE PER-LEVEL CONFIG ────────────────────────────────────────
// speed      : pixels per frame (30fps)
// interval   : frames between car spawns
// firstDelay : frames before first spawn when level starts
// ── PLACEHOLDER VALUES — tune to taste ──────────────────────────────
const LANE_CONFIG = {
  1: [
    { speed:2.0, interval:180, firstDelay:0 },
    { speed:2.0, interval:120,  firstDelay:0 },
    { speed:3.0, interval:120,  firstDelay:30 },
    { speed:4.0, interval:150,  firstDelay:0 },
  ],
  2: [
    { speed:2.0, interval:150,  firstDelay:30 },
    { speed:3.0, interval:120,  firstDelay:30 },
    { speed:3.0, interval:90,  firstDelay:60  },
    { speed:4.0, interval:150,  firstDelay:30 },
  ],
  3: [
    { speed:3.0, interval:150,  firstDelay:60 },
    { speed:3.0, interval:90,  firstDelay:90 },
    { speed:4.0, interval:120,  firstDelay:30  },
    { speed:4.0, interval:90,  firstDelay:120 },
  ],
  4: [
    { speed:3.0, interval:90,  firstDelay:30 },
    { speed:4.0, interval:120,  firstDelay:120 },
    { speed:4.0, interval:90,  firstDelay:90  },
    { speed:5.0, interval:120,  firstDelay:60 },
  ],
  5: [
    { speed:4.0, interval:120,  firstDelay:90  },
    { speed:4.0, interval:90,  firstDelay:30 },
    { speed:5.0, interval:120,  firstDelay:120  },
    { speed:5.0, interval:90,  firstDelay:60 },
  ],
  6: [
    { speed:4.0, interval:90,  firstDelay:30  },
    { speed:5.0, interval:120,  firstDelay:90 },
    { speed:5.0, interval:90,  firstDelay:120  },
    { speed:6.0, interval:120,  firstDelay:60 },
  ],
  7: [
    { speed:4.0, interval:90,  firstDelay:30  },
    { speed:5.0, interval:90,  firstDelay:60 },
    { speed:6.0, interval:120,  firstDelay:90  },
    { speed:7.0, interval:90,  firstDelay:120 },
  ],
  8: [
    { speed:4.0, interval:90,  firstDelay:30  },
    { speed:5.0, interval:60,  firstDelay:60 },
    { speed:6.0, interval:90,  firstDelay:90  },
    { speed:7.0, interval:60,  firstDelay:120 },
  ],
  9: [
    { speed:4.0, interval:45,  firstDelay:30  },
    { speed:5.0, interval:60,  firstDelay:60 },
    { speed:6.0, interval:60,  firstDelay:90  },
    { speed:7.0, interval:45,  firstDelay:120 },
  ],
};

// ── ATARI PALETTE ────────────────────────────────────────────────────
const C = {
  grassTop    : '#3a7a20',
  grassTopAlt : '#2e6418',
  grassBot    : '#2e6018',
  grassBotAlt : '#245014',
  road        : '#3a3a3a',
  roadAlt     : '#2e2e2e',
  laneMarker  : '#bbbbbb',
  divider     : '#e8c000',
  dividerDark : '#a08800',
  crossroad   : '#505828',
  crossEdge   : '#787840',
  moto        : '#10d8f8',
  motoDark    : '#0898b8',
};

const TCOLORS = [
  ['#e03018','#801008'],
  ['#f0a000','#905800'],
  ['#28b840','#107020'],
  ['#d050d0','#802880'],
  ['#e8e020','#989010'],
  ['#e07020','#904010'],
  ['#2090d8','#105888'],
  ['#e04060','#901030'],
];

// ── TRAFFIC ──────────────────────────────────────────────────────────
let laneObjs = [];

function makeLaneObjs() {
  laneObjs = [];
  for (let i = 0; i < NLANES; i++) {
    const cfg = LANE_CONFIG[gameLevel][i];
    laneObjs.push({
      group:'bot', laneIdx:i, dir:1,
      cy:laneCY('bot',i), speed:cfg.speed,
      interval:cfg.interval, timer:-cfg.firstDelay,
      cars:[], colorOff:i*2,
    });
    laneObjs.push({
      group:'top', laneIdx:i, dir:-1,
      cy:laneCY('top',i), speed:cfg.speed,
      interval:cfg.interval, timer:-cfg.firstDelay,
      cars:[], colorOff:i*2+1,
    });
  }
}

function applyLevelToLanes() {
  laneObjs.forEach(lo => {
    const cfg   = LANE_CONFIG[gameLevel][lo.laneIdx];
    lo.speed    = cfg.speed;
    lo.interval = cfg.interval;
    lo.cars.forEach(c => c.speed = cfg.speed * lo.dir);
  });
}

function spawnCar(lo) {
  const ci = (lo.colorOff + Math.floor(Math.random()*2)) % TCOLORS.length;
  const cw = 44 + Math.floor(Math.random()*20);
  const ch = 22;
  const x  = lo.dir > 0 ? -cw-4 : W+4;
  lo.cars.push({
    x, y:lo.cy-ch/2, w:cw, h:ch,
    col:TCOLORS[ci], speed:lo.speed*lo.dir,
  });
}

function updateTraffic() {
  laneObjs.forEach(lo => {
    lo.timer++;
    if (lo.timer >= lo.interval) { lo.timer=0; spawnCar(lo); }
    lo.cars.forEach(c => c.x += c.speed);
    lo.cars = lo.cars.filter(c => c.x > -100 && c.x < W+100);
  });
}

function drawCar(c) {
  const x=snap(c.x), y=snap(c.y), w=c.w, h=c.h;
  ctx.fillStyle=c.col[0]; ctx.fillRect(x,y,w,h);
  ctx.fillStyle=c.col[1];
  ctx.fillRect(x+~~(w*.18), y+~~(h*.22), ~~(w*.64), ~~(h*.55));
  ctx.fillStyle='rgba(160,210,255,0.45)';
  ctx.fillRect(x+~~(w*.10), y+~~(h*.18), ~~(w*.20), ~~(h*.62));
  ctx.fillRect(x+~~(w*.70), y+~~(h*.18), ~~(w*.20), ~~(h*.62));
  ctx.fillStyle='#111';
  ctx.fillRect(x+2,   y,     6,4); ctx.fillRect(x+w-8, y,     6,4);
  ctx.fillRect(x+2,   y+h-4, 6,4); ctx.fillRect(x+w-8, y+h-4, 6,4);
}

// ── ROAD ─────────────────────────────────────────────────────────────
function drawStripes(y,h,c1,c2,sh) {
  ctx.fillStyle=c1; ctx.fillRect(0,y,W,h);
  ctx.fillStyle=c2;
  for (let sy=y; sy<y+h; sy+=sh*2) ctx.fillRect(0,sy,W,sh);
}

function drawRoad() {
  drawStripes(SAFE_TOP_Y, SAFE_TOP_H, C.grassTop, C.grassTopAlt, 4);
  drawStripes(SAFE_BOT_Y, SAFE_BOT_H, C.grassBot, C.grassBotAlt, 4);

  for (let i=0; i<NLANES; i++) {
    ctx.fillStyle = i%2===0 ? C.road : C.roadAlt;
    ctx.fillRect(0, LANES_TOP_Y+i*LANE_H, W, LANE_H);
    ctx.fillRect(0, LANES_BOT_Y+i*LANE_H, W, LANE_H);
  }

  ctx.fillStyle=C.laneMarker;
  for (let i=1; i<NLANES; i++) {
    const yT=LANES_TOP_Y+i*LANE_H, yB=LANES_BOT_Y+i*LANE_H;
    for (let x=0; x<W; x+=28) {
      ctx.fillRect(x,yT-1,18,2); ctx.fillRect(x,yB-1,18,2);
    }
  }

  ctx.fillStyle='#999';
  ctx.fillRect(0,LANES_TOP_Y,                  W,2);
  ctx.fillRect(0,LANES_TOP_Y+NLANES*LANE_H-2,  W,2);
  ctx.fillRect(0,LANES_BOT_Y,                  W,2);
  ctx.fillRect(0,LANES_BOT_Y+NLANES*LANE_H-2,  W,2);

  ctx.fillStyle=C.divider;
  ctx.fillRect(0,DIVIDER_Y,W,DIVIDER_H);
  ctx.fillStyle=C.dividerDark;
  for (let x=0; x<W; x+=24) ctx.fillRect(x,DIVIDER_Y,12,DIVIDER_H);

  // Crossroad paths over everything
  for (const cx of [LEFT_CX, RIGHT_CX]) {
    ctx.fillStyle=C.crossroad;
    ctx.fillRect(snap(cx-CROSS_W/2), 0, CROSS_W, H);
    ctx.fillStyle=C.crossEdge;
    ctx.fillRect(snap(cx-CROSS_W/2),    0, 2, H);
    ctx.fillRect(snap(cx+CROSS_W/2-2),  0, 2, H);
  }
}

// ── LEVEL INDICATOR ──────────────────────────────────────────────────
function drawLevelIndicator() {
  if (warnActive) {
    const framesIntoLevel = frameCount % FRAMES_PER_LEVEL;
    const framesLeft      = FRAMES_PER_LEVEL - framesIntoLevel;
    const warnFrame       = WARN_FRAMES - framesLeft;
    if (warnFrame % WARN_CYCLE < WARN_DARK) return;  // dark phase
  }
  ctx.fillStyle='#f0c040';
  ctx.font='bold 28px "Press Start 2P","Courier New"';
  ctx.textAlign='left';
  ctx.fillText('L'+gameLevel, 6, 34);
}

function drawScoreDisplay() {
  ctx.fillStyle='#f0c040';
  ctx.font='bold 28px "Press Start 2P","Courier New"';
  ctx.textAlign='right';
  ctx.fillText(score, W-6, 34);
}

// ── PLAYER / MOTORCYCLE ──────────────────────────────────────────────
const MW           = 12;
const MH           = 24;
const MOTO_SPEED   = 4.0;   // px/frame — player controlled
const AUTO_SPEED   = 10.0;  // px/frame — auto transfer phase

// Auto-transfer states
// 'none'      — player has control
// 'exit'      — motorcycle speeding off screen (up or down)
// 'transfer'  — motorcycle is off-screen, being repositioned
// 'enter'     — motorcycle coming back on screen toward traffic entry

let player = {};

// Which crossroad the player is currently on: 'left' | 'right'
// Direction of travel when player-controlled: 'up' | 'down'
// (left crossroad = going up, right crossroad = going down)

function resetPlayer() {
  player = {
    x          : LEFT_CX,
    y          : CLEAR_BOT_Y,
    crossSide  : 'left',    // 'left' | 'right'
    autoState  : 'none',    // 'none' | 'exit' | 'transfer' | 'enter'
    visible    : true,
  };
}

// Entry Y for each side when returning from auto-transfer:
// Left crossroad: player travels UP → enters from bottom safe zone
// Right crossroad: player travels DOWN → enters from top safe zone
function entryY(side) {
  return side === 'left' ? CLEAR_BOT_Y : CLEAR_TOP_Y;
}

// The Y at which the player is "close to entering the first lane of traffic"
// Left side (going up):   bottom edge of bottom lanes = SAFE_BOT_Y (y=416)
// Right side (going down): top edge of top lanes = LANES_TOP_Y (y=40)
function trafficEntryY(side) {
  return side === 'left'
    ? SAFE_BOT_Y - MH        // just above bottom safe zone, ready to enter
    : LANES_TOP_Y + MH;      // just below top safe zone, ready to enter
}

function drawMoto(x, y, flipped) {
  ctx.save();
  ctx.translate(snap(x), snap(y));
  if (flipped) ctx.rotate(Math.PI);
  const px=-MW/2, py=-MH/2;
  // Front wheel (narrow vertical strip, top)
  ctx.fillStyle='#1a1a1a';
  ctx.fillRect(px+3, py, 6, 6);
  // Body / engine (wider middle)
  ctx.fillStyle=C.moto;
  ctx.fillRect(px+1, py+6, MW-2, 12);
  // Rider (darker band across body)
  ctx.fillStyle=C.motoDark;
  ctx.fillRect(px+1, py+9, MW-2, 5);
  // Rear wheel (narrow vertical strip, bottom)
  ctx.fillStyle='#1a1a1a';
  ctx.fillRect(px+3, py+18, 6, 6);
  // Headlight (small bright dot on front wheel)
  ctx.fillStyle='#ffff99';
  ctx.fillRect(px+5, py+1, 2, 2);
  ctx.restore();
}

function updatePlayer() {
  const p = player;

  if (p.autoState === 'none') {
    // ── Normal player control ────────────────────────────────────────
    // Left crossroad: only UP moves toward traffic; DOWN moves away (clamped)
    // Right crossroad: only DOWN moves toward traffic; UP moves away (clamped)
    if (keys['ArrowUp'])   p.y -= MOTO_SPEED;
    if (keys['ArrowDown']) p.y += MOTO_SPEED;

    // Clamp to screen
    p.y = Math.max(MH/2+1, Math.min(H-MH/2-1, p.y));
    p.x = p.crossSide === 'left' ? LEFT_CX : RIGHT_CX;

    // Check if player has cleared the traffic on their current side
    if (p.crossSide === 'left'  && p.y < SAFE_TOP_Y + MH) startAutoTransfer();
    if (p.crossSide === 'right' && p.y > H - MH)           startAutoTransfer();

  } else if (p.autoState === 'exit') {
    // ── Speeding off screen ──────────────────────────────────────────
    if (p.crossSide === 'left') {
      p.y -= AUTO_SPEED;
      if (p.y + MH/2 < 0) beginTransfer();
    } else {
      p.y += AUTO_SPEED;
      if (p.y - MH/2 > H) beginTransfer();
    }

  } else if (p.autoState === 'transfer') {
    // Off-screen: reposition to other crossroad, same off-screen zone
    // crossSide has already been flipped in beginTransfer()
    // Just move one frame then go to 'enter'
    p.autoState = 'enter';
    p.x = p.crossSide === 'left' ? LEFT_CX : RIGHT_CX;
    // Place off-screen on the correct side
    if (p.crossSide === 'left') {
      p.y = H + MH;   // below screen, will travel up
    } else {
      p.y = -MH;      // above screen, will travel down
    }

  } else if (p.autoState === 'enter') {
    // ── Re-entering from off screen ──────────────────────────────────
    // Left crossroad enters from bottom (travel up)
    // Right crossroad enters from top (travel down)
    if (p.crossSide === 'left') {
      p.y -= AUTO_SPEED;
      // Stop when safely in bottom safe zone, ready for player
      if (p.y <= CLEAR_BOT_Y) {
        p.y = CLEAR_BOT_Y;
        finishAutoTransfer();
      }
    } else {
      p.y += AUTO_SPEED;
      // Stop when safely in top safe zone, ready for player
      if (p.y >= CLEAR_TOP_Y) {
        p.y = CLEAR_TOP_Y;
        finishAutoTransfer();
      }
    }
  }
}

function startAutoTransfer() {
  player.autoState = 'exit';
  // Count the lap when transfer sequence begins
  laps++;
  score += gameLevel;
  if (laps > hiScore) hiScore = laps;
  beep(880,0.07); beep(1100,0.07); beep(1320,0.10); beep(1760,0.14);
}

function beginTransfer() {
  // Flip to the other crossroad
  player.crossSide  = player.crossSide === 'left' ? 'right' : 'left';
  player.autoState  = 'transfer';
}

function finishAutoTransfer() {
  player.autoState = 'none';
}

// ── COLLISION (only when player has control) ─────────────────────────
function checkCollision() {
  if (player.autoState !== 'none') return false;
  const px=player.x-MW/2+2, py=player.y-MH/2+1;
  const pw=MW-4, ph=MH-2;
  for (const lo of laneObjs)
    for (const c of lo.cars)
      if (px < c.x+c.w && px+pw > c.x && py < c.y+c.h && py+ph > c.y)
        return true;
  return false;
}

// ── LEVEL TIMER ──────────────────────────────────────────────────────
let gameLevel  = 1;
let frameCount = 0;

function updateLevel() {
  frameCount++;
  const newLevel = Math.min(MAX_LEVEL, Math.floor(frameCount/FRAMES_PER_LEVEL)+1);
  if (newLevel !== gameLevel) {
    gameLevel = newLevel;
    applyLevelToLanes();
    warnActive = false;
    beep(440,0.05); beep(550,0.08);
  }

  // Warning: last 5 seconds of each level
  const framesIntoLevel = frameCount % FRAMES_PER_LEVEL;
  const framesLeft      = FRAMES_PER_LEVEL - framesIntoLevel;
  warnActive = (framesLeft <= WARN_FRAMES);

  // Fire beep on the first frame of each 30-frame warn cycle
  if (warnActive) {
    const warnFrame = WARN_FRAMES - framesLeft;  // 0..149
    if (warnFrame % WARN_CYCLE === 0) beep(520, 0.06);
  }

  if (frameCount >= FRAMES_PER_LEVEL * MAX_LEVEL) endGame();
}

// ── GAME STATE ───────────────────────────────────────────────────────
let state='title', laps=0, hiScore=0, score=0, flashTimer=0;
let warnActive=false;
document.getElementById('footer').textContent = 'PRESS SPACE TO START';
let frozen=false, freezeEnd=0;

function startGame() {
  laps=0; score=0; gameLevel=1; frameCount=0; frozen=false; warnActive=false;
  document.getElementById('footer').textContent='';
  resetPlayer();
  makeLaneObjs();
  state='playing';
}

// TODO: rename this function
function killPlayer() {
  if (frozen) return;
  frozen   = true;
  freezeEnd = performance.now() + HIT_FREEZE_MS;
  player.autoState = 'none';
  beep(220,0.05,'sawtooth');
  setTimeout(()=>beep(160,0.05,'sawtooth'), 80);
  setTimeout(()=>beep(100,0.15,'sawtooth',0.18), 160);
}

function resetPlayerToPathStart() {
  if (player.crossSide === 'left') {
    player.x = LEFT_CX;
    player.y = CLEAR_BOT_Y;
  } else {
    player.x = RIGHT_CX;
    player.y = CLEAR_TOP_Y;
  }
}

function endGame() {
  state='gameover';
  beep(440,0.1); beep(330,0.1); beep(220,0.3,'sawtooth',0.18);
  document.getElementById('footer').textContent='PRESS SPACE TO PLAY AGAIN';
}

// ── AUDIO ────────────────────────────────────────────────────────────
let audioCtx=null;
function initAudio() {
  if (!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
}
function beep(freq,dur,type='square',vol=0.12) {
  if (!audioCtx) return;
  try {
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.start(); o.stop(audioCtx.currentTime+dur);
  } catch(e){}
}

function carPass(vol) {
  if (!audioCtx) return;
  try {
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type='sawtooth';
    o.frequency.setValueAtTime(130, audioCtx.currentTime);
    o.frequency.linearRampToValueAtTime(60, audioCtx.currentTime+0.55);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(vol*1.1, audioCtx.currentTime+0.2);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.7);
    o.start(); o.stop(audioCtx.currentTime+0.7);
  } catch(e){}
}

// Track which cars have already triggered their sound this pass
const soundedCars = new WeakSet();

function checkCarSounds() {
  // Only fire sounds when player has control and is on a vertical road
  if (player.autoState !== 'none') return;

  const playerX = player.crossSide === 'left' ? LEFT_CX : RIGHT_CX;
  const playerY = player.y;

  for (const lo of laneObjs) {
    // Only consider lanes whose X range covers the player's current vertical road
    // Cars span the full width so we check if the car overlaps the player's X column
    for (const c of lo.cars) {
      if (soundedCars.has(c)) continue;

      // Car must be on the player's current road column
      if (c.x > playerX || c.x + c.w < playerX) continue;

      // Y-distance check
      const carCY = c.y + c.h / 2;
      const dist  = Math.abs(carCY - playerY);
      if (dist >= CAR_SOUND_DIST) continue;

      // Volume: 0 at 200px, max at 0px
      const vol = (1 - dist / CAR_SOUND_DIST) * 0.18;
      carPass(vol);
      soundedCars.add(c);
    }
  }
}

// ── INPUT ────────────────────────────────────────────────────────────
const keys={};
document.addEventListener('keydown', e=>{
  keys[e.key]=true;
  if (e.key===' ') {
    initAudio();
    if (state==='title'||state==='gameover') startGame();
    e.preventDefault();
  }
  if (['ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e=>{ keys[e.key]=false; });

function snap(v) { return Math.round(v); }

// ── OVERLAY SCREENS ───────────────────────────────────────────────────
function drawTitle() {
  drawRoad();
  drawMoto(LEFT_CX,  CLEAR_BOT_Y, false);
  drawMoto(RIGHT_CX, CLEAR_TOP_Y, true);
  ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,W,H);
}

function drawGameOverOverlay() {
  ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,W,H);
}

function drawScanlines() {
  ctx.fillStyle='rgba(0,0,0,0.09)';
  for (let y=0; y<H; y+=2) ctx.fillRect(0,y,W,1);
}

// ── 30 FPS LOOP ───────────────────────────────────────────────────────
let lastTime=0;

function loop(ts) {
  requestAnimationFrame(loop);
  if (ts - lastTime < FRAME_MS - 1) return;
  lastTime = ts;

  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

  if (state==='title') { drawTitle(); drawScanlines(); return; }

  drawRoad();
  updateTraffic();

  if (state==='playing') {
    if (frozen) {
      if (performance.now() >= freezeEnd) {
        frozen = false;
        resetPlayerToPathStart();
      }
    } else {
      updatePlayer();
      updateLevel();
      checkCarSounds();
      if (checkCollision()) killPlayer();
    }
  }

  laneObjs.forEach(lo => lo.cars.forEach(drawCar));

  // Draw motorcycle (even during auto states, so player sees it zoom off/on)
  drawMoto(player.x, player.y, player.crossSide === 'right');

  drawLevelIndicator();
  drawScoreDisplay();

  if (state==='gameover') drawGameOverOverlay();

  drawScanlines();
}

requestAnimationFrame(loop);
</script>
